<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ASYLUM INMATES — Songbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070707;
            --s1: #0f0f0f;
            --s2: #151515;
            --s3: #1c1c1c;
            --border: #242424;
            --gold: #c9930a;
            --gold2: #e8aa15;
            --glow: rgba(201, 147, 10, .18);
            --white: #f0f0f0;
            --gray: #6a6a6a;
            --gray2: #999;
            --green: #22c55e;
            --blue: #60a5fa;
            --amber: #f59e0b;
            --red: #f87171;
            --purple: #a78bfa;
            --teal: #2dd4bf;
            --pink: #f472b6;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            scroll-behavior: smooth
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Barlow Condensed', sans-serif;
            min-height: 100vh;
            overflow-x: hidden
        }

        /* NOISE TEXTURE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: .35
        }

        /* ── HEADER ── */
        header {
            position: relative;
            text-align: center;
            padding: 60px 20px 40px;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            z-index: 1
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201, 147, 10, .12) 0%, transparent 70%);
            pointer-events: none
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(52px, 10vw, 96px);
            letter-spacing: .08em;
            line-height: 1;
            background: linear-gradient(160deg, #f5c842 0%, #c9930a 40%, #8a5e04 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 32px rgba(201, 147, 10, .3))
        }

        .tagline {
            font-size: 13px;
            letter-spacing: .35em;
            color: var(--gray2);
            text-transform: uppercase;
            margin-top: 6px
        }

        .counts {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            flex-wrap: wrap
        }

        .count-pill {
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 12px;
            color: var(--gray2);
            letter-spacing: .05em
        }

        .count-pill span {
            color: var(--gold2);
            font-weight: 600;
            margin-right: 4px
        }

        /* GLOBAL BANNER */
        .global-banner {
            padding: 10px 20px 0;
            max-width: 1280px;
            margin: 0 auto
        }

        .global-listen-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
            background: linear-gradient(135deg, rgba(201, 147, 10, .15), rgba(201, 147, 10, .08));
            border: 1px solid rgba(201, 147, 10, .35);
            color: var(--gold2);
            text-decoration: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-family: "Bebas Neue", sans-serif;
            font-size: 16px;
            letter-spacing: .1em;
            transition: all .25s
        }

        .global-listen-btn:hover {
            background: linear-gradient(135deg, rgba(201, 147, 10, .28), rgba(201, 147, 10, .15));
            box-shadow: 0 0 30px rgba(201, 147, 10, .2);
            transform: translateY(-1px)
        }

        .global-listen-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0
        }

        /* ALBUM HEADER with cover */
        .album-cover {
            width: 56px;
            height: 56px;
            border-radius: 7px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border)
        }

        .album-listen {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .04em;
            color: var(--gold2);
            text-decoration: none;
            background: rgba(201, 147, 10, .1);
            border: 1px solid rgba(201, 147, 10, .25);
            border-radius: 7px;
            padding: 6px 12px;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0
        }

        .album-listen:hover {
            background: rgba(201, 147, 10, .2);
            box-shadow: 0 0 16px rgba(201, 147, 10, .15)
        }

        .album-listen svg {
            width: 12px;
            height: 12px
        }

        /* ── NAV FILTERS ── */
        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(7, 7, 7, .92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            overflow-x: auto;
            white-space: nowrap;
            -ms-overflow-style: none;
            scrollbar-width: none
        }

        nav::-webkit-scrollbar {
            display: none
        }

        .filter-tabs {
            display: inline-flex;
            gap: 2px;
            padding: 10px 0
        }

        .tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid transparent;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: .04em;
            cursor: pointer;
            transition: all .2s;
            color: var(--gray2);
            background: transparent;
            white-space: nowrap
        }

        .tab:hover {
            color: var(--white);
            background: var(--s2)
        }

        .tab.active {
            color: var(--gold2);
            background: var(--glow);
            border-color: rgba(201, 147, 10, .3)
        }

        .tab .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0
        }

        /* ── SEARCH ── */
        .search-wrap {
            padding: 16px 20px 4px;
            max-width: 500px;
            position: relative;
            z-index: 1
        }

        .search-wrap input {
            width: 100%;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--white);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 15px;
            padding: 10px 16px;
            outline: none;
            transition: border-color .2s
        }

        .search-wrap input::placeholder {
            color: var(--gray)
        }

        .search-wrap input:focus {
            border-color: rgba(201, 147, 10, .4)
        }

        /* ── MAIN CONTENT ── */
        main {
            padding: 20px;
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
            z-index: 1
        }

        .album-section {
            margin-bottom: 40px
        }

        .album-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border)
        }

        .album-stripe {
            width: 3px;
            height: 24px;
            border-radius: 2px;
            flex-shrink: 0
        }

        .album-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: .08em;
            color: var(--white)
        }

        .album-sub {
            font-size: 12px;
            color: var(--gray);
            letter-spacing: .04em;
            margin-top: 1px
        }

        .album-link {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--gray);
            text-decoration: none;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 3px 9px;
            transition: all .2s;
            flex-shrink: 0
        }

        .album-link:hover {
            color: var(--gold2);
            border-color: rgba(201, 147, 10, .3)
        }

        /* ── SONG GRID ── */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px
        }

        /* ── SONG CARD ── */
        .song-card {
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all .25s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .song-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--glow);
            opacity: 0;
            transition: opacity .25s
        }

        .song-card:hover {
            border-color: rgba(201, 147, 10, .35);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .4)
        }

        .song-card:hover::before {
            opacity: 1
        }

        .song-card.no-lyrics {
            opacity: .75
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            gap: 10px
        }

        .card-num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--gray);
            flex-shrink: 0;
            margin-top: 2px;
            width: 20px
        }

        .card-info {
            flex: 1;
            min-width: 0
        }

        .card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 19px;
            letter-spacing: .06em;
            line-height: 1.1;
            color: var(--white)
        }

        .card-credits {
            font-size: 11px;
            color: var(--gray2);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .card-dur {
            font-size: 11px;
            color: var(--gray);
            flex-shrink: 0;
            font-family: 'IBM Plex Mono', monospace
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center
        }

        .stag {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: .06em;
            padding: 2px 7px;
            border-radius: 12px;
            white-space: nowrap;
            text-transform: uppercase
        }

        .stag-live {
            background: rgba(34, 197, 94, .15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, .25)
        }

        .stag-approved {
            background: rgba(96, 165, 250, .15);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, .25)
        }

        .stag-letra {
            background: rgba(201, 147, 10, .15);
            color: var(--gold2);
            border: 1px solid rgba(201, 147, 10, .25)
        }

        .stag-inst {
            background: rgba(107, 114, 128, .1);
            color: #9ca3af;
            border: 1px solid rgba(107, 114, 128, .2)
        }

        .stag-melodia {
            background: rgba(245, 158, 11, .12);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, .2)
        }

        .stag-analise {
            background: rgba(245, 158, 11, .1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, .2)
        }

        .stag-revisao {
            background: rgba(251, 146, 60, .12);
            color: #fb923c;
            border: 1px solid rgba(251, 146, 60, .2)
        }

        .stag-dev {
            background: rgba(167, 139, 250, .1);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, .2)
        }

        .card-arrow {
            position: absolute;
            bottom: 12px;
            right: 14px;
            font-size: 14px;
            color: var(--gold);
            opacity: 0;
            transition: opacity .2s, transform .2s
        }

        .song-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(3px)
        }

        /* ── MODAL ── */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .75);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
            backdrop-filter: blur(4px)
        }

        #modal-overlay.open {
            opacity: 1;
            pointer-events: all
        }

        #modal {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: min(600px, 100vw);
            background: var(--s1);
            border-left: 1px solid var(--border);
            z-index: 201;
            transform: translateX(100%);
            transition: transform .35s cubic-bezier(.16, 1, .3, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        #modal.open {
            transform: translateX(0)
        }

        .modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--s1);
            position: sticky;
            top: 0;
            z-index: 10
        }

        .modal-header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(28px, 6vw, 40px);
            letter-spacing: .06em;
            line-height: 1;
            color: var(--gold2);
            text-shadow: 0 0 30px rgba(201, 147, 10, .3)
        }

        .modal-album-badge {
            font-size: 11px;
            color: var(--gray2);
            background: var(--s3);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 3px 9px;
            white-space: nowrap;
            margin-top: 4px;
            display: inline-block
        }

        .modal-credits {
            font-size: 13px;
            color: var(--gray2);
            margin-top: 4px;
            letter-spacing: .02em
        }

        .modal-close {
            background: var(--s3);
            border: 1px solid var(--border);
            color: var(--gray2);
            border-radius: 7px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
            transition: all .2s
        }

        .modal-close:hover {
            color: var(--white);
            border-color: var(--gray2)
        }

        .modal-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap
        }

        .modal-suno {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(201, 147, 10, .12);
            border: 1px solid rgba(201, 147, 10, .3);
            color: var(--gold2);
            text-decoration: none;
            border-radius: 7px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .05em;
            transition: all .2s;
            margin-left: auto
        }

        .modal-suno:hover {
            background: rgba(201, 147, 10, .22);
            box-shadow: 0 0 20px rgba(201, 147, 10, .2)
        }

        .modal-suno svg {
            width: 14px;
            height: 14px
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            -ms-overflow-style: none;
            scrollbar-width: thin;
            scrollbar-color: var(--s3) transparent
        }

        .modal-body::-webkit-scrollbar {
            width: 4px
        }

        .modal-body::-webkit-scrollbar-track {
            background: transparent
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: var(--s3);
            border-radius: 2px
        }

        /* ── LYRICS ── */
        .lyrics-section {
            margin-bottom: 24px
        }

        .lyr-header {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px;
            letter-spacing: .12em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(201, 147, 10, .15)
        }

        .lyr-lines {
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .lyr-line {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--white)
        }

        .lyr-line.italic {
            color: var(--gray2);
            font-style: italic
        }

        .lyr-line.note {
            color: var(--gray);
            font-style: italic;
            font-size: 11px
        }

        .lyr-line.spacer {
            height: 8px
        }

        .no-lyrics-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray2)
        }

        .no-lyrics-msg .icon {
            font-size: 32px;
            margin-bottom: 12px
        }

        .no-lyrics-msg p {
            font-size: 14px;
            line-height: 1.6
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
            font-size: 14px
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--s3);
            border-radius: 3px
        }

        @media(max-width:640px) {
            .song-grid {
                grid-template-columns: 1fr
            }

            #modal {
                width: 100vw;
                top: auto;
                height: 90vh;
                border-left: none;
                border-top: 1px solid var(--border);
                border-radius: 16px 16px 0 0;
                transform: translateY(100%)
            }

            #modal.open {
                transform: translateY(0)
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ASYLUM INMATES</div>
        <div class="tagline">Songbook Oficial — Autorais</div>
        <div class="counts">
            <div class="count-pill"><span id="c-total">34</span>músicas</div>
            <div class="count-pill"><span id="c-letra">23</span>com letra</div>
            <div class="count-pill"><span id="c-live">2</span>ao vivo</div>
            <div class="count-pill"><span id="c-albums">8</span>álbuns</div>
        </div>
    </header>

    <nav>
        <div class="filter-tabs" id="filter-tabs"></div>
    </nav>

    <div class="search-wrap">
        <input type="text" id="search" placeholder="Buscar música..." autocomplete="off">
    </div>

    <div class="global-banner">
        <a href="https://suno.com/playlist/d0b8349e-f275-4cc9-a19a-5b30eee96f9c" target="_blank" class="global-listen-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm-1 13V8l6 4-6 4z" />
            </svg>
            ESCUTE TODAS AS MÚSICAS DE UMA VEZ NO SUNO
        </a>
    </div>

    <main id="catalog"></main>

    <div id="modal-overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div class="modal-header">
            <div class="modal-header-top">
                <div>
                    <div class="modal-title" id="m-title"></div>
                    <span class="modal-album-badge" id="m-album"></span>
                </div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-credits" id="m-credits"></div>
            <div class="modal-meta">
                <div id="m-tags"></div>
                <a id="m-suno" href="#" target="_blank" class="modal-suno">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm0 2a7 7 0 110 14A7 7 0 0112 5zm-1 4v6l5-3-5-3z" />
                    </svg>
                    Ouvir no Suno
                </a>
            </div>
        </div>
        <div class="modal-body" id="m-lyrics"></div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════
        // ALBUMS
        // ═══════════════════════════════════════════════════
        const ALBUMS = [
            { id: 'all', name: 'Todas', color: '#c9930a', playlist: null },
            { id: 'live', name: 'Da Banda — Ao Vivo', color: '#22c55e', playlist: 'https://suno.com/playlist/d0b8349e-f275-4cc9-a19a-5b30eee96f9c' },
            { id: 'sfn', name: 'Songs from Nowhere', color: '#60a5fa', playlist: 'https://suno.com/playlist/6b7a382a-1932-401d-b431-ab41694d56ba' },
            { id: 'ds', name: 'Dual Side EP', color: '#a78bfa', playlist: 'https://suno.com/playlist/f668fdca-b66a-454b-a342-772af63a1813' },
            { id: 'apo', name: 'Post-Apocalyptical Crysis', color: '#f87171', playlist: 'https://suno.com/playlist/a54aa117-108d-4a58-9de2-aad83ae5d96a' },
            { id: 'dev', name: 'Project Deviatte', color: '#fbbf24', playlist: 'https://suno.com/playlist/c3cbed2c-e1d7-41e5-8959-0490b520ab3a' },
            { id: 'gj', name: 'Game Journey EP', color: '#2dd4bf', playlist: 'https://suno.com/playlist/47ea4a8f-861a-4475-bc1d-087c6462423b' },
            { id: 'jon', name: "JonMonkey's Mind", color: '#9ca3af', playlist: 'https://suno.com/playlist/39536d4f-52ba-4c27-a16b-0c8ca57ea56f' },

            {

        ]; // end SONGS

        // ═══════════════════════════════════════════════════
        // STATUS CONFIG
        // ═══════════════════════════════════════════════════
        const STATUS = {
            live: { label: 'Ao Vivo 🎤', cls: 'stag-live' },
            approved: { label: '✅ Aprovada', cls: 'stag-approved' },
            letra: { label: '📝 Letra', cls: 'stag-letra' },
            inst: { label: '🎸 Instrumental', cls: 'stag-inst' },
            melodia: { label: '🎵 Melodia', cls: 'stag-melodia' },
            analise: { label: '⚠️ Análise', cls: 'stag-analise' },
            revisao: { label: '✏️ Revisão', cls: 'stag-revisao' },
            dev: { label: '🔧 Em Dev', cls: 'stag-dev' },
        };

        // ═══════════════════════════════════════════════════
        // LYRICS PARSER
        // ═══════════════════════════════════════════════════
        function parseLyrics(raw) {
            if (!raw) return null;
            const sections = [];
            let current = { header: null, lines: [] };
            for (const line of raw.split('\n')) {
                const t = line.trim();
                if (t.startsWith('##')) {
                    if (current.lines.length > 0 || current.header) sections.push(current);
                    current = { header: t.slice(2).trim(), lines: [] };
                } else if (t === '') {
                    current.lines.push({ type: 'spacer', text: '' });
                } else if (t.startsWith('~')) {
                    current.lines.push({ type: 'italic', text: t.slice(1).trim() });
                } else if (t.startsWith('!')) {
                    current.lines.push({ type: 'note', text: t.slice(1).trim() });
                } else {
                    current.lines.push({ type: 'normal', text: t });
                }
            }
            if (current.lines.length > 0 || current.header) sections.push(current);
            return sections;
        }

        // ═══════════════════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════════════════
        let activeAlbum = 'all';
        let searchQuery = '';

        // ═══════════════════════════════════════════════════
        // RENDER
        // ═══════════════════════════════════════════════════
        function renderFilters() {
            const nav = document.getElementById('filter-tabs');
            nav.innerHTML = ALBUMS.map(a => `
    <button class="tab ${activeAlbum === a.id ? 'active' : ''}" onclick="setAlbum('${a.id}')">
      <span class="dot" style="background:${a.color}"></span>
      ${a.name}
    </button>
  `).join('');
        }

        function renderCatalog() {
            const main = document.getElementById('catalog');
            const query = searchQuery.toLowerCase();

            const albumsToShow = activeAlbum === 'all'
                ? ALBUMS.filter(a => a.id !== 'all')
                : ALBUMS.filter(a => a.id === activeAlbum);

            let html = '';
            let totalVisible = 0;

            for (const album of albumsToShow) {
                const albumSongs = SONGS.filter(s => {
                    if (s.album !== album.id) return false;
                    if (query && !s.title.toLowerCase().includes(query) && !s.credits.toLowerCase().includes(query)) return false;
                    return true;
                });
                if (!albumSongs.length) continue;
                totalVisible += albumSongs.length;

                const st = STATUS;
                html += `
      <section class="album-section">
        <div class="album-header">
          <div class="album-stripe" style="background:${album.color}"></div>
          <div>
            <div class="album-title">${album.name}</div>
            <div class="album-sub">${albumSongs.length} músicas</div>
          </div>
          ${album.playlist ? `<a href="${album.playlist}" target="_blank" class="album-link">▶ Playlist no Suno</a>` : ''}
        </div>
        <div class="song-grid">
          ${albumSongs.map(s => {
                    const hasLyr = !!s.lyrics;
                    const stag = STATUS[s.status] || { label: s.status, cls: 'stag-inst' };
                    return `
            <div class="song-card ${!hasLyr ? 'no-lyrics' : ''}" onclick="${hasLyr ? `openModal('${s.id}')` : `window.open('${s.suno}','_blank')`}">
              <div class="card-top">
                <span class="card-num">${s.num}</span>
                <div class="card-info">
                  <div class="card-title">${s.title}</div>
                  <div class="card-credits">${s.credits}</div>
                </div>
                <span class="card-dur">${s.dur}</span>
              </div>
              <div class="card-tags">
                <span class="stag ${stag.cls}">${stag.label}</span>
                ${hasLyr ? '<span class="stag stag-letra" style="opacity:.6;font-size:9px">📄 ver letra</span>' : '<span class="stag stag-inst" style="opacity:.7;font-size:9px">▶ abrir no Suno</span>'}
              </div>
              <span class="card-arrow" style="${!hasLyr ? 'color:var(--gray2)' : ''}">→</span>
            </div>`;
                }).join('')}
        </div>
      </section>`;
            }

            main.innerHTML = totalVisible ? html : '<div class="empty-state">Nenhuma música encontrada.</div>';
        }

        // ═══════════════════════════════════════════════════
        // MODAL
        // ═══════════════════════════════════════════════════
        function openModal(id) {
            const song = SONGS.find(s => s.id === id);
            if (!song || !song.lyrics) return;
            const album = ALBUMS.find(a => a.id === song.album);
            const stag = STATUS[song.status] || { label: song.status, cls: 'stag-inst' };

            document.getElementById('m-title').textContent = song.title;
            document.getElementById('m-album').textContent = album ? album.name : '';
            document.getElementById('m-credits').textContent = song.credits + ' · ' + song.dur;
            document.getElementById('m-tags').innerHTML = `<span class="stag ${stag.cls}">${stag.label}</span>`;

            const sunoEl = document.getElementById('m-suno');
            sunoEl.href = song.suno;
            sunoEl.style.display = song.suno ? 'inline-flex' : 'none';

            if (!song.lyrics) {
                const stMsg = song.status === 'melodia'
                    ? '🎵 Melodia vocal gravada — letra ainda não escrita'
                    : song.status === 'dev'
                        ? '🔧 Em desenvolvimento — letra pendente'
                        : '🎸 Instrumental — sem letra';
                document.getElementById('m-lyrics').innerHTML = `
      <div class="no-lyrics-msg">
        <div class="icon">🎸</div>
        <p style="font-size:15px;color:var(--gray2);margin-bottom:16px">${stMsg}</p>
        <p style="font-size:13px;color:var(--gray);line-height:1.7">Esta música ainda não possui letra registrada.<br>
        Clique em <strong style="color:var(--gold2)">Ouvir no Suno</strong> para escutar a versão instrumental.</p>
      </div>`;
                return;
            }

            const sections = parseLyrics(song.lyrics);
            const lyricsHtml = sections.map(sec => `
    <div class="lyrics-section">
      ${sec.header ? `<div class="lyr-header">${sec.header}</div>` : ''}
      <div class="lyr-lines">
        ${sec.lines.map(ln => {
                if (ln.type === 'spacer') return '<div class="lyr-line spacer"></div>';
                if (ln.type === 'italic') return `<div class="lyr-line italic">${ln.text}</div>`;
                if (ln.type === 'note') return `<div class="lyr-line note">— ${ln.text}</div>`;
                return `<div class="lyr-line">${ln.text}</div>`;
            }).join('')}
      </div>
    </div>
  `).join('');

            document.getElementById('m-lyrics').innerHTML = lyricsHtml;
            document.getElementById('modal-overlay').classList.add('open');
            document.getElementById('modal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
            document.getElementById('modal').classList.remove('open');
            document.body.style.overflow = '';
        }

        // ═══════════════════════════════════════════════════
        // FILTER + SEARCH
        // ═══════════════════════════════════════════════════
        function setAlbum(id) {
            activeAlbum = id;
            renderFilters();
            renderCatalog();
        }

        document.getElementById('search').addEventListener('input', function () {
            searchQuery = this.value;
            renderCatalog();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        // ═══════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════
        renderFilters();
        renderCatalog();
    </script>
</body>

</html>
